services:
  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: dev
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - /var/www/html/vendor
    environment:
      APP_ENV: dev
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: mysql://app:${MYSQL_PASSWORD}@mysql:3306/house_visits?serverVersion=8.0&charset=utf8mb4
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - app

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: house_visits
      MYSQL_USER: app
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

volumes:
  mysql_data:

networks:
  app:
