services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile.prod
    image: ghcr.io/niobedev/toral-house-dashboard:latest
    container_name: toral-house-app
    restart: unless-stopped
    environment:
      APP_ENV: prod
      APP_SECRET: ${APP_SECRET}
      DATABASE_URL: ${DATABASE_URL}
      GOOGLE_SHEET_ID: ${GOOGLE_SHEET_ID}
      GOOGLE_SHEET_RANGE: ${GOOGLE_SHEET_RANGE}
    volumes:
      - ${GOOGLE_SA_KEY_PATH}:/opt/secrets/google-sa-key.json:ro
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - internal  # talks to mysql
      - proxy     # reachable by external Caddy

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-house_visits}
      MYSQL_USER: ${MYSQL_USER:-app}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal  # not exposed to proxy network

volumes:
  mysql_data:

networks:
  internal:          # private network between app and mysql
  proxy:             # shared with external Caddy
    external: true   # must be created once on the server: docker network create proxy
